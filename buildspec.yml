version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto8

  build:
    commands:
      - echo Build started on `date`
      - mvn clean install

  post_build:
    commands:
      - echo Build completed on `date`
      - echo Packaging artifacts...
      - mvn package

artifacts:
  files:
    - target/*.war
  discard-paths: no